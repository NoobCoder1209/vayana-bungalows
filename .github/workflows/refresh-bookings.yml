name: Refresh bookings from Google Sheets

# Pulls fresh booking data from the Google Sheet on a schedule (every 10 min)
# and commits the resulting assets/data/bookings.json to main if it changed.
# A commit on main triggers the existing deploy.yml workflow, which republishes
# the static site with the new dates baked in.

on:
  schedule:
    # GitHub cron is best-effort and often runs 5-15 min late on shared
    # runners; that's acceptable for our 10-minute target latency.
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (log what would be written, do not commit)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  # Prevent two refresh runs racing (would happen if the workflow runs longer
  # than 10 min for any reason). New runs cancel pending older ones.
  group: refresh-bookings
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # We need full history because we'll commit + push as the bot.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch bookings from Google Sheets
        env:
          SPREADSHEET_ID: ${{ vars.SPREADSHEET_ID }}
          GOOGLE_SHEETS_KEY: ${{ secrets.GOOGLE_SHEETS_KEY }}
        run: |
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            node scripts/fetch-bookings.mjs --dry-run
          else
            node scripts/fetch-bookings.mjs
          fi

      - name: Commit bookings.json if changed
        if: ${{ inputs.dry_run != true }}
        env:
          # Use the github-actions[bot] identity so the commit doesn't look
          # like it came from a person's account.
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          if git diff --quiet -- public/assets/data/bookings.json; then
            echo "No changes to bookings.json — skipping commit."
            echo "::notice::No booking changes detected; skipped commit and deploy."
            exit 0
          fi

          # Summarise what's about to land in the commit message
          summary=$(node -e "
            const j = JSON.parse(require('fs').readFileSync('public/assets/data/bookings.json'));
            const parts = Object.entries(j.bungalows).map(([k, v]) => k + '=' + v.length);
            console.log(parts.join(', '));
          ")

          git add public/assets/data/bookings.json
          git commit -m "chore: refresh bookings from Google Sheets ($summary)"
          git push
          echo "::notice::Committed bookings.json changes ($summary) and pushed to main."
