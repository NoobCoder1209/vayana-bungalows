name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Workflow-private group so a cron data-refresh in refresh-bookings.yml
  # can never cancel a developer's in-flight code deploy. Pages itself
  # serialises deployments to the github-pages environment.
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch bookings from Google Sheets
        # Pull live booking data so a code-change deploy ships with fresh
        # availability too. Behaviour:
        #   - Secret unset (forks, PR previews on accounts without the
        #     secret): build a clearly-marked empty bookings.json so the
        #     site still deploys, just with no dates disabled.
        #   - Secret set but malformed: the script's JSON.parse throws and
        #     fail()s the build. We deliberately don't silently ship empty
        #     here — that would un-block real reservations.
        env:
          SPREADSHEET_ID: ${{ vars.SPREADSHEET_ID }}
          GOOGLE_SHEETS_KEY: ${{ secrets.GOOGLE_SHEETS_KEY }}
        run: |
          if [[ -z "$GOOGLE_SHEETS_KEY" ]]; then
            echo "::warning::GOOGLE_SHEETS_KEY not set — building with empty bookings.json (fallback mode)"
            mkdir -p public/assets/data
            cat > public/assets/data/bookings.json <<EOF
          {"generatedAt":"$(date -u +%Y-%m-%dT%H:%M:%SZ)","fallback":true,"bungalows":{"B1":[],"B2":[],"B3":[]}}
          EOF
          else
            node scripts/fetch-bookings.mjs
          fi

      - run: npm run build
        env:
          # Surfaced in booking.js as `?v=<run id>` on the bookings.json fetch
          # URL so each deploy gets a fresh cache key at the Fastly edge.
          VITE_BUILD_ID: ${{ github.run_id }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
